<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카페 무브 안내 챗봇</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background: #f0f2f5;
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh;
    }
    .chat {
      width: 420px; height: 640px; background: #fff; border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      background: #6f4e37; color: #fff; padding: 16px 20px;
      font-size: 18px; font-weight: 600;
    }
    .header small { display: block; font-weight: 400; opacity: 0.8; font-size: 12px; }
    .messages {
      flex: 1; padding: 16px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px; background: #fafafa;
    }
    .msg { max-width: 78%; padding: 10px 14px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #6f4e37; color: #fff; border-bottom-right-radius: 4px; }
    .bot  { align-self: flex-start; background: #e9e9eb; color: #222; border-bottom-left-radius: 4px; }
    .typing { font-style: italic; color: #888; }
    .input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #eee; }
    .input-area input {
      flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px;
    }
    .input-area button {
      padding: 0 18px; border: none; border-radius: 24px; background: #6f4e37; color: #fff;
      font-weight: 600; cursor: pointer;
    }
    .input-area button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="header">
      ☕ 카페 무브 안내 챗봇
      <small>영업시간 · 메뉴 · 주차 등을 물어보세요</small>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">안녕하세요! 카페 무브입니다. 무엇을 도와드릴까요?</div>
    </div>
    <div class="input-area">
      <input id="input" type="text" placeholder="메시지를 입력하세요..." autocomplete="off" />
      <button id="send">전송</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");

    // 대화 맥락을 이어가기 위한 직전 응답 id
    let responseId = null;

    function addMessage(text, who) {
      const div = document.createElement("div");
      div.className = "msg " + who;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage(text, "user");
      inputEl.value = "";
      sendBtn.disabled = true;

      const typing = addMessage("입력 중...", "bot");
      typing.classList.add("typing");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, response_id: responseId }),
        });
        const data = await res.json();
        responseId = data.response_id;          // 다음 호출에 사용
        typing.classList.remove("typing");
        typing.textContent = data.reply;
      } catch (e) {
        typing.classList.remove("typing");
        typing.textContent = "오류가 발생했습니다. 서버를 확인해주세요.";
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
