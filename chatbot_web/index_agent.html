<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 에이전트 챗봇</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background: #f0f2f5;
      margin: 0; display: flex; justify-content: center; align-items: center;
      height: 100vh;
    }
    .chat {
      width: 420px; height: 640px; background: #fff; border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      background: #2c4a6e; color: #fff; padding: 16px 20px;
      font-size: 18px; font-weight: 600;
    }
    .header small { display: block; font-weight: 400; opacity: 0.8; font-size: 12px; }
    .header .badge {
      display: inline-block; margin-top: 6px; padding: 2px 10px;
      background: rgba(255,255,255,0.2); border-radius: 12px;
      font-size: 12px; font-weight: 400;
    }
    .messages {
      flex: 1; padding: 16px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px; background: #fafafa;
    }
    .msg { max-width: 78%; padding: 10px 14px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #2c4a6e; color: #fff; border-bottom-right-radius: 4px; }
    .bot  { align-self: flex-start; background: #e9e9eb; color: #222; border-bottom-left-radius: 4px; }
    .agent-label {
      align-self: flex-start; font-size: 11px; color: #888;
      margin: 2px 0 -6px 6px;
    }
    .typing { font-style: italic; color: #888; }
    .input-area { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #eee; }
    .input-area input {
      flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 24px; outline: none; font-size: 14px;
    }
    .input-area button {
      padding: 0 18px; border: none; border-radius: 24px; background: #2c4a6e; color: #fff;
      font-weight: 600; cursor: pointer;
    }
    .input-area button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="chat">
    <div class="header">
      🤖 AI 에이전트 챗봇
      <small>날씨 · 계산 · 검색을 물어보면 전문 에이전트가 답합니다</small>
      <span class="badge">현재 담당: <span id="agent-badge">Triage Agent</span></span>
    </div>
    <div class="messages" id="messages">
      <div class="msg bot">안녕하세요! 무엇을 도와드릴까요? 날씨, 계산, 검색 질문은 전문 에이전트가 답변해 드립니다.</div>
    </div>
    <div class="input-area">
      <input id="input" type="text" placeholder="메시지를 입력하세요..." autocomplete="off" />
      <button id="send">전송</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const agentBadgeEl = document.getElementById("agent-badge");

    // 대화 맥락을 이어가기 위한 두 가지 상태.
    // 서버는 아무것도 기억하지 않으므로, 클라이언트가 들고 있다가 매번 보냅니다.
    let responseId = null;   // 직전 응답 id
    let agentName = null;    // 직전 대화의 담당 에이전트 이름

    function addMessage(text, who) {
      const div = document.createElement("div");
      div.className = "msg " + who;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    // 봇 답변 위에 어느 에이전트가 답했는지 작은 라벨을 붙입니다.
    function addAgentLabel(name) {
      const div = document.createElement("div");
      div.className = "agent-label";
      div.textContent = name;
      messagesEl.appendChild(div);
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage(text, "user");
      inputEl.value = "";
      sendBtn.disabled = true;

      const typing = addMessage("입력 중...", "bot");
      typing.classList.add("typing");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            response_id: responseId,
            agent_name: agentName,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "서버 오류");

        responseId = data.response_id;   // 다음 호출에 사용
        agentName = data.agent_name;     // 다음 호출의 시작 에이전트

        typing.remove();
        addAgentLabel(data.agent_name);
        addMessage(data.reply, "bot");
        agentBadgeEl.textContent = data.agent_name;
      } catch (e) {
        typing.classList.remove("typing");
        typing.textContent = "오류가 발생했습니다. 서버를 확인해주세요.";
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
